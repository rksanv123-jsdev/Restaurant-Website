<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Restaurant Billing</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-header">
    <h1 class="app-title">Restaurant Billing</h1>
    <nav class="nav-tabs">
      <button class="nav-tab active" data-target="billing-section">Billing</button>
      <button class="nav-tab" data-target="report-section">Monthly Report</button>
      <button class="nav-tab" data-target="menu-section">Manage Menu</button>
    </nav>
  </header>

  <main class="app-main">
    <!-- Billing Section -->
    <section id="billing-section" class="app-section visible">
      <div class="billing-layout">
        <div class="menu-panel">
          <h2 class="section-title">Menu</h2>
          <div id="menu-grid" class="menu-grid">
            <!-- Menu cards rendered by JS -->
          </div>
        </div>
        <div class="cart-panel">
          <h2 class="section-title">Current Bill</h2>
          <div class="cart-table-wrapper">
            <table class="cart-table">
              <thead>
                <tr>
                  <th>Item</th>
                  <th>Qty</th>
                  <th>Price</th>
                  <th>Subtotal</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="cart-body">
                <!-- Cart rows rendered by JS -->
              </tbody>
            </table>
          </div>
          <div class="cart-footer">
            <div class="total-line">
              <span>Total:</span>
              <span id="cart-total" class="total-amount">₹0.00</span>
            </div>
            <div class="cart-actions">
              <button id="pay-now-btn" class="btn btn-primary">Pay Now</button>
              <button id="print-bill-btn" class="btn btn-secondary">Print Bill</button>
              <button id="clear-cart-btn" class="btn btn-danger">Clear Cart</button>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Monthly Report Section -->
    <section id="report-section" class="app-section">
      <h2 class="section-title">Monthly Sales Report</h2>
      <div class="report-controls">
        <label for="report-month">Select Month:</label>
        <input type="month" id="report-month" />
      </div>
      <div class="report-summary">
        <div class="summary-card">
          <span class="summary-label">Total Sales</span>
          <span id="summary-total-sales" class="summary-value">₹0.00</span>
        </div>
        <div class="summary-card">
          <span class="summary-label">Number of Bills</span>
          <span id="summary-bill-count" class="summary-value">0</span>
        </div>
        <div class="summary-card">
          <span class="summary-label">Average Bill</span>
          <span id="summary-average-bill" class="summary-value">₹0.00</span>
        </div>
      </div>
      <div class="report-table-wrapper">
        <table class="report-table">
          <thead>
            <tr>
              <th>Date/Time</th>
              <th>Total</th>
              <th>Items Count</th>
            </tr>
          </thead>
          <tbody id="report-body">
            <!-- Report rows rendered by JS -->
          </tbody>
        </table>
      </div>
    </section>

    <!-- Manage Menu Section -->
    <section id="menu-section" class="app-section">
      <h2 class="section-title">Manage Menu</h2>
      <div class="menu-admin-layout">
        <div class="menu-admin-form">
          <h3 id="menu-form-title">Add Menu Item</h3>
          <form id="menu-form">
            <input type="hidden" id="menu-item-id" />
            <div class="form-row">
              <label for="menu-item-name">Name</label>
              <input id="menu-item-name" type="text" required />
            </div>
            <div class="form-row">
              <label for="menu-item-price">Price (₹)</label>
              <input id="menu-item-price" type="number" step="0.01" min="0" required />
            </div>
            <div class="form-row">
              <label for="menu-item-image">Image URL (optional)</label>
              <input id="menu-item-image" type="text" placeholder="https://example.com/image.jpg" />
            </div>
            <div class="form-actions">
              <button type="submit" class="btn btn-primary">Save Item</button>
              <button type="button" id="menu-form-reset" class="btn btn-secondary">Reset</button>
            </div>
          </form>
        </div>

        <div class="menu-admin-table-wrapper">
          <table class="menu-admin-table">
            <thead>
              <tr>
                <th>Name</th>
                <th>Price</th>
                <th>Active</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="menu-admin-body">
              <!-- Menu admin rows rendered by JS -->
            </tbody>
          </table>
        </div>
      </div>
    </section>
  </main>

  <!-- QR Modal -->
  <div id="qr-modal" class="modal">
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <h3>Scan to Pay</h3>
      <p>Amount: <span id="qr-amount">₹0.00</span></p>
      <div class="qr-image-wrapper">
        <img id="qr-image" src="https://via.placeholder.com/200x200?text=QR+Code" alt="QR Code" />
      </div>
      <div class="modal-actions">
        <button id="qr-complete-bill-btn" class="btn btn-primary">Payment Completed</button>
        <button id="qr-close-btn" class="btn btn-secondary">Close</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
